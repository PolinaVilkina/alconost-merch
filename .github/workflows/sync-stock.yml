name: Sync merch stock from Google Sheets

on:
  schedule:
    - cron: '*/30 * * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Fetch and parse sheet
        run: |
          python3 - << 'EOF'
          import csv, json, re, urllib.request

          SHEET_ID = '1Vh913Z3nTDQJhWt-CqgpoKnLyv-rd_e2UEFRg4DvCtk'
          url = f'https://docs.google.com/spreadsheets/d/{SHEET_ID}/export?format=csv'
          with urllib.request.urlopen(url) as r:
              text = r.read().decode('utf-8')

          # Items that can appear multiple times get disambiguated by occurrence order
          NAME_MAP_ORDERED = {
              'laptop case':   ['laptop_case'],
              't-shirt':       ['tshirt', 'tshirt_black'],
              'sweatshirt':    ['sweatshirt'],
              'backpack':      ['backpack'],
              'hoodie':        ['hoodie'],
              'luggage cover': ['luggage_cover'],
              'thetmos mug':   ['bottle'],
              'thermos mug':   ['bottle'],
              'thermos':       ['bottle'],
              'rain poncho':   ['rain_poncho'],
              'windbreaker':   ['rain_poncho'],
              'socks':         ['socks'],
          }
          name_occurrence = {}

          def normalize_label(s):
              s = s.strip()
              s = re.sub(r'(\d),(\d)', r'\1.\2', s)
              return ' '.join(w[0].upper() + w[1:] if w else w for w in s.split())

          stock = {}
          current_key = None
          reader = csv.reader(text.splitlines())
          next(reader)  # skip header

          for row in reader:
              if len(row) < 3:
                  continue
              name_raw = row[0].strip()
              size_raw = row[1].strip()
              qty_raw  = row[2].strip()

              if name_raw:
                  name_lower = name_raw.lower()
                  variants = NAME_MAP_ORDERED.get(name_lower)
                  if variants:
                      occ = name_occurrence.get(name_lower, 0)
                      current_key = variants[min(occ, len(variants) - 1)]
                      name_occurrence[name_lower] = occ + 1
                      stock.setdefault(current_key, [])

              if current_key is None:
                  continue

              try:
                  qty = int(qty_raw)
              except ValueError:
                  qty = 0

              if size_raw:
                  stock[current_key].append({'label': normalize_label(size_raw), 'qty': qty})

          # ensure all known items present
          for variants in NAME_MAP_ORDERED.values():
              for key in variants:
                  stock.setdefault(key, [])

          with open('stock.json', 'w') as f:
              json.dump(stock, f, indent=2)
          total = sum(len(v) for v in stock.values())
          print(f"Wrote stock.json: {len(stock)} items, {total} size entries")
          EOF

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock.json
          git diff --cached --quiet || git commit -m "chore: sync merch stock from Google Sheets"
          git push
